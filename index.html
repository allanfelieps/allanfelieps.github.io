<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora de Rescisão</title>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  background: #f4f7fb;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

h1 {
  font-size: 32px;
  text-align: center;
  margin-bottom: 10px;
  color: #1a1a1a;
}

.subtitulo {
  font-size: 16px;
  text-align: center;
  margin-bottom: 25px;
  color: #555;
}

label {
  font-weight: 600;
  margin-top: 15px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #f9fafc;
  font-size: 14px;
}

input:focus, select:focus {
  outline: none;
  border-color: #00a86b;
  background: #fff;
}

.input-group {
  position: relative;
}

.input-group span {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
}

.input-group input {
  padding-left: 30px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #00a86b;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #008f5a;
}

.resultado {
  margin-top: 20px;
  padding: 15px;
  background: #f1fdf7;
  border-radius: 8px;
  display: none;
}

.checkbox {
  margin-top: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox input {
  width: auto;
  margin: 0;
}
</style>
</head>

<body>

<div class="container">

  <h1>CÁLCULO DA RESCISÃO</h1>
  <div class="subtitulo">
    Saiba agora como realizar o cálculo da rescisão trabalhista
  </div>

  <label>Motivo da rescisão</label>
  <select id="motivo">
    <option value="sem">Sem justa causa</option>
    <option value="pedido">Pedido de demissão</option>
    <option value="justa">Justa causa</option>
  </select>

  <label>Data de admissão</label>
  <input type="date" id="admissao">

  <label>Data de demissão</label>
  <input type="date" id="demissao">

  <label>Salário</label>
  <div class="input-group">
    <span>R$</span>
    <input type="text" id="salario">
  </div>

  <label class="checkbox">
    <input type="checkbox" id="ferias">
    <span>Possui férias vencidas</span>
  </label>

  <button onclick="calcular()">Calcular</button>
  <button onclick="baixarPDF()">Baixar PDF</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
function formatarMoeda(valor) {
  return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

document.getElementById("salario").addEventListener("input", function(e) {
  let valor = e.target.value.replace(/\D/g, "");
  valor = (valor / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  e.target.value = valor;
});

function calcular() {
  const motivo = document.getElementById("motivo").value;
  const admissao = new Date(document.getElementById("admissao").value);
  const demissao = new Date(document.getElementById("demissao").value);
  let salario = document.getElementById("salario").value.replace(/\./g,'').replace(',','.');
  salario = parseFloat(salario);

  const ferias = document.getElementById("ferias").checked;

  if (!salario || !admissao || !demissao) {
    alert("Preencha tudo!");
    return;
  }

  const meses = Math.floor((demissao - admissao) / (1000*60*60*24*30));

  let fgts = salario * 0.08 * meses;
  let multa = fgts * 0.4;
  let valorFerias = ferias ? salario + salario/3 : 0;

  if (motivo === "pedido") {
    multa = 0;
  }

  if (motivo === "justa") {
    multa = 0;
    valorFerias = 0;
  }

  const total = salario + fgts + multa + valorFerias;

  const resultado = document.getElementById("resultado");
  resultado.style.display = "block";

  resultado.innerHTML = `
    <strong>Resultado:</strong><br><br>
    Tempo: ${meses} meses<br>
    Salário: ${formatarMoeda(salario)}<br>
    FGTS: ${formatarMoeda(fgts)}<br>
    Multa: ${formatarMoeda(multa)}<br>
    ${valorFerias ? `Férias: ${formatarMoeda(valorFerias)}<br>` : ""}
    <br><strong>Total: ${formatarMoeda(total)}</strong>

    <hr>

    <small>
    Este cálculo é apenas uma estimativa. Consulte um contador ou advogado trabalhista.
    </small>
  `;
}

function baixarPDF() {
  const conteudo = document.getElementById("resultado").innerText;
  const win = window.open('', '', 'height=700,width=700');
  win.document.write('<pre>' + conteudo + '</pre>');
  win.document.close();
  win.print();
}
</script>

</body>
</html>
