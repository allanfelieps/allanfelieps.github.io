<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Rescisão</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Calculadora de Rescisão</h1>

  <label>Data de admissão</label>
  <input type="date" id="admissao">

  <label>Data de demissão</label>
  <input type="date" id="demissao">

  <label>Salário</label>
  <input type="number" id="salario">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
  const admissao = new Date(document.getElementById("admissao").value);
  const demissao = new Date(document.getElementById("demissao").value);
  const salario = parseFloat(document.getElementById("salario").value);

  if (!document.getElementById("admissao").value || 
      !document.getElementById("demissao").value || 
      !salario) {
    alert("Preencha todos os campos!");
    return;
  }

  const tempo = (demissao - admissao) / (1000 * 60 * 60 * 24 * 30);
  const meses = Math.floor(tempo);

  const saldoSalario = salario;
  const fgts = salario * 0.08 * meses;
  const multa = fgts * 0.4;

  const total = saldoSalario + fgts + multa;

  const resultado = document.getElementById("resultado");
  resultado.style.display = "block";

  resultado.innerHTML = `
    <strong>Resultado:</strong><br><br>
    Tempo trabalhado: ${meses} meses<br>
    Saldo de salário: R$ ${saldoSalario.toFixed(2)}<br>
    FGTS: R$ ${fgts.toFixed(2)}<br>
    Multa FGTS: R$ ${multa.toFixed(2)}<br><br>
    <strong>Total: R$ ${total.toFixed(2)}</strong>
  `;
}
</script>

</body>
</html>
