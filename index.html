<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora de Rescisão</title>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  background: #f4f7fb;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;

  /* ADICIONADO: FADE-IN */
  animation: fadeIn 0.6s ease;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  text-align: center;
}

form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, select {
  padding: 10px;
}

button {
  padding: 10px;
  background: #0a3d62;
  color: white;
  border: none;
  cursor: pointer;
}

#resultado {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Calculadora de Rescisão</h1>

  <form>
    <input type="number" id="salario" placeholder="Salário mensal">

    <select id="motivo">
      <option value="">Motivo da demissão</option>
      <option value="sem">Sem justa causa</option>
      <option value="com">Com justa causa</option>
      <option value="pedido">Pedido de demissão</option>
    </select>

    <select id="ferias">
      <option value="">Férias vencidas</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>

    <select id="aviso">
      <option value="">Aviso prévio</option>
      <option value="trabalhado">Trabalhado</option>
      <option value="indenizado">Indenizado</option>
    </select>

    <button type="button" onclick="calcular()">Calcular</button>
  </form>

  <div id="resultado"></div>
</div>

<!-- ADICIONADO: RODAPÉ -->
<footer style="text-align:center; margin-top:30px; color:#888; font-size:14px;">
  © 2026 - Todos os direitos reservados
</footer>

<script>
function calcular(){
  const salario = parseFloat(document.getElementById('salario').value) || 0;
  const motivo = document.getElementById('motivo').value;
  const ferias = document.getElementById('ferias').value;
  const aviso = document.getElementById('aviso').value;

  if(!salario || !motivo || !ferias || !aviso){
    alert('Preencha todos os campos');
    return;
  }

  let total = salario;

  if(motivo === 'sem') total += salario;
  if(ferias === 'sim') total += salario / 3;
  if(aviso === 'indenizado') total += salario;

  document.getElementById('resultado').innerHTML =
    "Valor aproximado: R$ " + total.toFixed(2);
}
</script>

</body>
</html>
