<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Rescisão Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif; }
body { background:#f0f4fb; color:#333; padding:20px; }

/* CONTAINER CENTRAL */
.container {
  max-width:750px;
  margin:auto;
  background:#fff;
  padding:45px 35px;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.1);
}

/* TÍTULO */
h1 {
  font-size:38px;
  text-align:center;
  color:#0a3d62;
  margin-bottom:8px;
}
h2 {
  font-size:18px;
  text-align:center;
  font-weight:400;
  color:#555;
  margin-bottom:40px;
}

/* FORMULÁRIO COM ANIMAÇÃO */
form {
  display:flex;
  flex-direction:column;
  gap:28px;
}
label {
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  opacity:0;
  transform: translateY(20px);
  animation: fadeUp 0.6s forwards;
}
label:nth-child(1){ animation-delay:0.1s; }
label:nth-child(2){ animation-delay:0.2s; }
label:nth-child(3){ animation-delay:0.3s; }
label:nth-child(4){ animation-delay:0.4s; }

@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}

input, select {
  padding:14px 18px;
  border-radius:12px;
  border:none;
  font-size:16px;
  background: linear-gradient(90deg,#e0f0ff,#d6e9fc);
  box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
}
input:focus, select:focus {
  outline:none;
  box-shadow:0 0 12px rgba(10,61,98,0.25);
}

/* BOTÃO PREMIUM COM ÍCONE */
button {
  padding:16px;
  font-size:16px;
  font-weight:600;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:#fff;
  background: linear-gradient(90deg,#0a3d62,#06508b);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:all 0.3s ease, transform 0.2s ease;
}
button:hover {
  background: linear-gradient(90deg,#06508b,#0a3d62);
  transform:translateY(-2px);
}

/* ÍCONE TOOLTIP MODERNA */
.tooltip {
  position: relative;
  display: inline-block;
  cursor: pointer;
  color:#0a3d62;
  font-weight:bold;
  font-size:18px;
}
.tooltip .tooltiptext {
  visibility:hidden;
  width:280px;
  background-color:#0a3d62;
  color:#fff;
  text-align:left;
  padding:15px;
  border-radius:12px;
  position:absolute;
  z-index:1;
  bottom:130%;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  transition:opacity 0.4s;
  font-size:14px;
  line-height:1.5;
}
.tooltip:hover .tooltiptext { visibility:visible; opacity:1; }

/* RESULTADO COM FADE-IN PREMIUM */
#resultado {
  background: linear-gradient(90deg,#dbe9fd,#cde4fc);
  padding:28px;
  border-radius:14px;
  margin-top:30px;
  font-size:16px;
  line-height:1.6;
  opacity:0;
  transform:translateY(25px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#resultado.show { opacity:1; transform:translateY(0); }

/* RODAPÉ */
footer {
  text-align:center;
  margin-top:55px;
  font-size:14px;
  color:#888;
}

/* RESPONSIVO */
@media(max-width:600px){
  h1{ font-size:32px; }
  h2{ font-size:16px; }
}
</style>
</head>
<body>

<div class="container">
<h1>CÁLCULO DA RESCISÃO</h1>
<h2>Descubra rapidamente quanto você tem direito a receber</h2>

<form id="rescisaoForm">
  <label>Salário Mensal
    <input type="number" id="salario" placeholder="R$ 0,00" required>
  </label>

  <label>Motivo da Demissão
    <select id="motivo">
      <option value="">Selecione</option>
      <option value="sem_justa_causa">Sem Justa Causa</option>
      <option value="com_justa_causa">Com Justa Causa</option>
      <option value="pedido_rescisao">Pedido de Rescisão</option>
    </select>
    <span class="tooltip">❓
      <span class="tooltiptext">
        Sem justa causa: a empresa encerra o contrato.<br>
        Com justa causa: o empregado cometeu falta grave.<br>
        Pedido de rescisão: o próprio empregado pede demissão.
      </span>
    </span>
  </label>

  <label>Possui Férias Vencidas
    <select id="ferias">
      <option value="">Selecione</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>
    <span class="tooltip">❓
      <span class="tooltiptext">
        Se você não tirou suas férias completas, você tem direito a receber o valor correspondente.
      </span>
    </span>
  </label>

  <label>Aviso Prévio
    <select id="aviso">
      <option value="">Selecione</option>
      <option value="trabalhado">Trabalhado</option>
      <option value="indenizado">Indenizado</option>
    </select>
    <span class="tooltip">❓
      <span class="tooltiptext">
        Aviso prévio trabalhado: você cumpre o período de aviso.<br>
        Aviso prévio indenizado: você recebe o valor sem precisar trabalhar.
      </span>
    </span>
  </label>

  <button type="button" onclick="calcular()">💰 Calcular Rescisão</button>
</form>

<div id="resultado"></div>
</div>

<footer>
&copy; 2026 Allan Felipe. Todos os direitos reservados.
</footer>

<script>
function calcular(){
  const salario = parseFloat(document.getElementById('salario').value) || 0;
  const motivo = document.getElementById('motivo').value;
  const ferias = document.getElementById('ferias').value;
  const aviso = document.getElementById('aviso').value;

  if(!salario || !motivo || !ferias || !aviso){
    alert('Preencha todos os campos para calcular.');
    return;
  }

  let total = salario;
  if(motivo==='sem_justa_causa') total += salario;
  if(ferias==='sim') total += salario/3;
  if(aviso==='indenizado') total += salario;

  const resultadoDiv = document.getElementById('resultado');
  resultadoDiv.innerHTML = `
    <strong>Resumo do cálculo:</strong><br>
    Salário base: R$ ${salario.toFixed(2)}<br>
    Motivo da demissão: ${motivo.replace('_',' ')}<br>
    Férias vencidas: ${ferias}<br>
    Aviso prévio: ${aviso}<br>
    <strong>Total aproximado a receber: R$ ${total.toFixed(2)}</strong>
  `;
  resultadoDiv.classList.add('show');
}
</script>

</body>
</html>
